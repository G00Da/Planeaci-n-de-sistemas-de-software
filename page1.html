<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page 1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="header-slot"></div>

  <main class="contenido">
    <section class="card">
      <h1>Page 1</h1>
      <p>Esta página consume PokeAPI y muestra nombre + imagen.</p>
    </section>

    <section class="poke-box">
      <h2>Pokémon</h2>

      <div class="poke-controls">
        <input id="pokeInput" type="text" placeholder="Escribe un nombre o ID (pikachu / 25)" />
        <button id="pokeBtn" type="button">Buscar</button>
      </div>

      <p id="pokeMsg" class="poke-msg" style="display:none;"></p>

      <div id="pokeResult" class="poke-result" style="display:none;">
        <img id="pokeImg" alt="" />
        <h3 id="pokeName"></h3>
      </div>
    </section>
  </main>

  <div id="footer-slot"></div>

  <script src="app.js"></script>
  <script src="pokemon.js"></script>
</body>
</html>
