<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscar Pokemon</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="header-slot"></div>

  <main class="contenido">
    <section class="card">
      <h1>Buscar Pokemon</h1>
      <p>Escribe el nombre o el número de Pokedex y te muestro su informacion.</p>
    </section>

    <section class="card search-card">
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Ej: pikachu o 25" />
        <button id="searchBtn" type="button">Buscar</button>
      </div>
      <p id="searchStatus" class="statusText"></p>
    </section>

    <section id="resultCard" class="card poke-result" style="display:none;">
      <div class="poke-result-top">
        <div>
          <h2 id="pokeName" class="poke-title"></h2>
          <p id="pokeId" class="poke-sub"></p>
          <div id="pokeTypes" class="poke-types"></div>
          <p id="pokeExtra" class="poke-extra"></p>
        </div>
        <img id="pokeImg" class="poke-img-big" alt="Imagen del Pokémon" />
      </div>
    </section>
  </main>

  <div id="footer-slot"></div>

  <script src="app.js"></script>
  <script src="pokemon.js"></script>
</body>
</html>
